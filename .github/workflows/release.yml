name: Build FFmpeg Static Releases

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: "FFmpeg tag, branch, or commit"
        default: "n8.1"
        required: true
      create_release:
        description: "Create or update GitHub Release"
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runs_on: '"ubuntu-24.04"'
            config_file: config/ffmpeg.configure
          - target: linux-arm64
            runs_on: '"ubuntu-24.04-arm"'
            config_file: config/ffmpeg.configure

    runs-on: ${{ fromJSON(matrix.runs_on) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo ./scripts/install-build-deps.sh

      - name: Build
        env:
          FFMPEG_REF: ${{ github.event.inputs.ffmpeg_ref || 'n8.1' }}
          TARGET: ${{ matrix.target }}
          CONFIG_FILE: ${{ github.workspace }}/${{ matrix.config_file }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/${{ matrix.target }}
        run: ./scripts/build.sh

      - name: Package
        id: package
        shell: bash
        env:
          BUILD_REF: ${{ github.event.inputs.ffmpeg_ref || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          safe_ref="${BUILD_REF//\//-}"
          name="ffmpeg-${{ matrix.target }}-$safe_ref"
          staging="artifacts/$name"
          mkdir -p "$staging"
          cp -a "dist/${{ matrix.target }}/." "$staging/"
          tar -C artifacts -czf "artifacts/$name.tar.gz" "$name"
          echo "asset=artifacts/$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}

      - name: Upload release asset
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET: ${{ steps.package.outputs.asset }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "FFmpeg VAAPI-capable builds generated by GitHub Actions." || gh release view "$TAG" >/dev/null
          fi
          gh release upload "$TAG" "$ASSET" --clobber
